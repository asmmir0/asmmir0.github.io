<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE — Sport Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:ital,wght@0,400;0,600;0,800;1,800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!--
  ===================================================================
   РЕДАКТИРУЙ только блок CONFIG в скрипте внизу.
   - brand : название, headline (с {hl} вокруг подсветки), eyebrow
   - heroPhoto : URL фото для шапки
   - features[] : 4 иконки-фишки (icon: shield/clock/truck/star/check)
   - cards[] : секции с фото и текстом (photo, title, sub, button-label, url, type)
   - links[] : основные кнопки внизу
   - locations[] : филиалы и телефоны
  ===================================================================
-->
<style>
  :root{
    --bg:#0a0a0a;
    --bg-2:#131313;
    --bg-3:#1a1a1a;
    --ink:#ffffff;
    --ash:#8a8d92;
    --neon:#b8ff3a;
    --neon-soft:#8ec92a;
    --neon-glow:rgba(184,255,58,.35);
    --hair:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--ink);min-height:100dvh;
    display:flex;justify-content:center;
  }
  .page{width:100%;max-width:460px;background:var(--bg);position:relative;overflow-x:hidden;}

  /* corner lightning bolt — signature motif */
  .bolt{
    position:absolute;top:-10px;left:8px;width:64px;height:auto;z-index:5;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
    opacity:0;animation:fadeup .6s .1s ease forwards;
  }

  /* floating diamond accent */
  .diamond{
    position:absolute;width:22px;height:22px;
    background:var(--neon);transform:rotate(45deg);
    box-shadow:0 0 24px var(--neon-glow);
    z-index:4;
  }

  /* ---------- HERO ---------- */
  .hero{position:relative;padding:24px 20px 26px;overflow:hidden;}
  .hero-photo{
    position:relative;width:100%;aspect-ratio:1/1.05;
    border-radius:14px;overflow:hidden;
    background:#222;
  }
  .hero-photo img{width:100%;height:100%;object-fit:cover;
    transform:scale(1.05);animation:kenburns 16s ease-out forwards;}
  @keyframes kenburns{from{transform:scale(1.18);}to{transform:scale(1.02);}}
  .hero-photo::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,10,10,.15) 0%, rgba(10,10,10,.0) 35%, rgba(10,10,10,.55) 100%);
  }
  .hero .diamond{top:46%;right:14px;}

  .headline{
    position:absolute;left:32px;right:32px;bottom:34px;z-index:3;
    font-family:"Anton",Impact,sans-serif;
    font-style:italic;
    color:var(--ink);text-shadow:0 4px 24px rgba(0,0,0,.4);
  }
  .headline .l1{
    font-size:clamp(48px,15vw,72px);
    line-height:.86;letter-spacing:.005em;
  }
  .headline .l2{
    font-size:clamp(22px,6.8vw,32px);
    line-height:1;margin-top:6px;
    display:flex;flex-wrap:wrap;align-items:center;gap:8px;
  }
  .hl{
    display:inline-block;
    background:var(--neon);color:#0a0a0a;
    padding:3px 12px 4px;border-radius:4px;
    transform:skew(-6deg);font-style:italic;
    box-shadow:0 0 18px var(--neon-glow);
  }
  .hl-out{
    display:inline-block;
    border:1.5px solid var(--neon);color:var(--ink);
    padding:2px 10px 3px;border-radius:4px;
    transform:skew(-6deg);font-style:italic;
  }
  .eyebrow{
    font-family:"JetBrains Mono",monospace;
    font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--neon);
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow .dot{width:6px;height:6px;background:var(--neon);transform:rotate(45deg);box-shadow:0 0 8px var(--neon-glow);}

  /* ---------- FEATURES (4 icons) ---------- */
  .feats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
    padding:0 20px 6px;
  }
  .feat{
    text-align:center;padding:14px 4px 12px;
    border:1px solid var(--hair);border-radius:14px;
    background:linear-gradient(180deg,var(--bg-2),var(--bg));
    transition:border-color .2s ease;
  }
  .feat:hover{border-color:var(--neon);}
  .feat .ic{
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--neon);
    margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
    color:var(--neon);
  }
  .feat .ic svg{width:18px;height:18px;}
  .feat .t{
    font-size:9px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--ash);line-height:1.3;font-weight:600;
  }

  /* ---------- CARDS (photo + text) ---------- */
  .cards{padding:24px 20px 4px;display:flex;flex-direction:column;gap:14px;}
  .card{
    position:relative;
    display:grid;grid-template-columns:115px 1fr;gap:14px;
    background:var(--bg-2);
    border:1px solid var(--hair);
    border-radius:18px;overflow:hidden;
    padding:14px;align-items:center;
    text-decoration:none;color:var(--ink);
    transition:border-color .25s ease,transform .12s ease;
  }
  .card:hover{border-color:var(--neon);}
  .card:hover::after{transform:scaleX(1);}
  .card::after{
    content:"";position:absolute;left:14px;right:14px;bottom:10px;
    height:2px;background:var(--neon);
    transform:scaleX(.4);transform-origin:left;
    transition:transform .35s ease;
    box-shadow:0 0 12px var(--neon-glow);
  }
  .card .ph{
    width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:#222;
  }
  .card .ph img{width:100%;height:100%;object-fit:cover;}
  .card .tx{padding:2px 0;}
  .card .ti{
    font-family:"Anton",Impact,sans-serif;font-style:italic;
    font-size:24px;line-height:1;letter-spacing:.01em;
  }
  .card .ti em{color:var(--neon);font-style:italic;}
  .card .su{
    font-size:12.5px;color:var(--ash);margin-top:8px;line-height:1.45;
    padding-bottom:14px;
  }
.bolt {
  width: 260px;
  height: 310px;
  object-fit: contain;
}
  /* ---------- BUTTONS ---------- */
  .links{padding:24px 20px 4px;display:flex;flex-direction:column;gap:10px;}
  .btn{
    --d:0ms;display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-radius:14px;
    text-decoration:none;color:var(--ink);
    border:1px solid var(--hair);background:var(--bg-2);
    transition:background .2s ease,border-color .2s ease,transform .12s ease;
    opacity:0;animation:fadeup .55s ease forwards;animation-delay:var(--d);
  }
  .btn:hover{border-color:var(--neon);}
  .btn:active{transform:translateY(1px);}
  .btn .l{display:flex;align-items:center;gap:14px;}
  .btn .ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--neon);color:var(--neon);flex:0 0 34px;}
  .btn .ic svg{width:17px;height:17px;}
  .btn .nm{font-family:"Anton",Impact,sans-serif;font-style:italic;font-size:19px;letter-spacing:.04em;text-transform:uppercase;}
  .btn .arr{font-family:"JetBrains Mono",monospace;color:var(--ash);transition:color .2s ease,transform .2s ease;}
  .btn:hover .arr{color:var(--neon);transform:translateX(3px);}
  .btn.primary{background:var(--neon);border-color:var(--neon);color:#0a0a0a;box-shadow:0 8px 30px -8px var(--neon-glow);}
  .btn.primary .ic{border-color:#0a0a0a;color:#0a0a0a;}
  .btn.primary .arr{color:#0a0a0a;}
  .btn.primary:hover{background:#a4e832;}

  /* ---------- FOOTER ---------- */
  .foot{
    padding:32px 20px 36px;text-align:center;
    font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--ash);
  }
  .foot b{color:var(--neon);font-weight:500;}

  /* entry animations */
  .eyebrow,.headline,.feat,.card{opacity:0;animation:fadeup .55s ease forwards;}
  .eyebrow{animation-delay:.20s;}
  .headline{animation-delay:.30s;}
  .feat:nth-child(1){animation-delay:.40s;}
  .feat:nth-child(2){animation-delay:.48s;}
  .feat:nth-child(3){animation-delay:.56s;}
  .feat:nth-child(4){animation-delay:.64s;}
  @keyframes fadeup{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;}
    .eyebrow,.headline,.feat,.card,.btn,.bolt{opacity:1 !important;}
  }
</style>
</head>
<body>
<div class="page">

  <!-- lightning bolt corner -->
 <img class="bolt" src="logo.png" alt="" aria-hidden="true">
 
  <section class="hero">
    <div class="hero-photo">
      <img id="heroImg" alt="" src="">
      <span class="diamond"></span>
      <div class="headline">
        <div class="eyebrow"><span class="dot"></span><span id="eyebrow"></span></div>
        <div class="l1" id="hl1"></div>
        <div class="l2" id="hl2"></div>
      </div>
    </div>
  </section>

  <section class="feats" id="feats"></section>

  <section class="cards" id="cards"></section>

  <section class="links" id="links"></section>

  <footer class="foot" id="foot"></footer>

</div>

<script>
/* ============================ CONFIG ============================ */
const brand = {
  eyebrow: "Tashkent · Sport Nutrition",
  hl1: "ТВОЯ {hl=ЦЕЛЬ}",          // {hl=...} = неоновая плашка
  hl2: "НАШ {hlOut=ПРОТЕИН}",     // {hlOut=...} = обводка
  heroPhoto: "g.avif"
};

const features = [
  { icon:"shield", label:"100%<br>ОРИГИНАЛ" },
  { icon:"check",  label:"СЕРТИ-<br>ФИКАТ" },
  { icon:"truck",  label:"БЫСТРАЯ<br>ДОСТАВКА" },
  { icon:"star",   label:"143K<br>КЛИЕНТОВ" }
];

const cards = [
  {
    title:"Каталог <em>товаров</em>",
    sub:"Протеин, креатин, BCAA, витамины — от ON, NOW, BPI, Mutant",
    photo:"pro.jpg",
    url:"https://t.me/+0uqbMb7Knfk0ZjIy"
  },
  {
    title:"Подбор <em>витамины </em>",
    sub:"Подберём комплекс под иммунитет, сон, кожу и волосы",
    photo:"v.avif",
    url:"https://t.me/+0uqbMb7Knfk0ZjIy"
  },
  {
    title:"Наш <em>адрес</em>",
    sub:"г. Ташкент, ул. Карасу, 31",
    photo:"loc1.jpg",
    url:"https://maps.app.goo.gl/9K3uXh1G2XgfVRsU9?g_st=it"
  }
];

const links = [
 
  { type:"telegram",  label:"Telegram",  url:"https://t.me/proteinokadisheva" },

  { type:"phone", label:"Позвонить", url:"tel:+998771038880" }
];



const locations = [];

const footerNote = "Tashkent · UZ <b>●</b> Только оригинал";
/* ========================== /CONFIG ============================ */

const icons = {
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V5z"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  truck:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7zM5.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM18.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7 7.5.6-5.7 5 1.7 7.4L12 18l-6.5 4 1.7-7.4L1.5 9.6 9 9z"/></svg>',
  whatsapp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.7-.6-3-1.3-4.9-4.3-5.1-4.5-.1-.2-1.2-1.5-1.2-2.9s.7-2 1-2.3c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.4.1.6-.1l.8-1c.2-.2.4-.2.6-.1l1.8.9c.3.1.4.2.5.3.1.2.1.7-.1 1.2z"/></svg>',
  telegram:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3 18.6 19.9c-.2 1-.9 1.3-1.7.8l-4.7-3.5-2.3 2.2c-.3.3-.5.5-.9.5l.3-4.6 8.4-7.6c.4-.3-.1-.5-.6-.2L7.4 13 2.8 11.6c-1-.3-1-1 .2-1.5L20.6 3c.8-.3 1.5.2 1.3 1.3z"/></svg>',
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  map:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>',
  phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.8.4 1.6.7 2.3a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.7-1.3a2 2 0 0 1 2.1-.4c.7.3 1.5.6 2.3.7a2 2 0 0 1 1.7 2z"/></svg>'
};

/* ----- helpers ----- */
function parseHL(s){
  return s
    .replace(/\{hl=([^}]+)\}/g, '<span class="hl">$1</span>')
    .replace(/\{hlOut=([^}]+)\}/g, '<span class="hl-out">$1</span>');
}

/* ----- hero ----- */
document.getElementById('heroImg').src = brand.heroPhoto;
document.getElementById('eyebrow').textContent = brand.eyebrow;
document.getElementById('hl1').innerHTML = parseHL(brand.hl1);
document.getElementById('hl2').innerHTML = parseHL(brand.hl2);

/* ----- features ----- */
document.getElementById('feats').innerHTML = features.map(f =>
  `<div class="feat"><div class="ic">${icons[f.icon]||icons.shield}</div><div class="t">${f.label}</div></div>`
).join('');

/* ----- cards ----- */
document.getElementById('cards').innerHTML = cards.map((c,i) => `
  <a class="card" style="animation-delay:${.70 + i*.08}s" href="${c.url}" target="_blank" rel="noopener">
    <div class="ph"><img src="${c.photo}" alt=""></div>
    <div class="tx">
      <div class="ti">${c.title}</div>
      <div class="su">${c.sub}</div>
    </div>
  </a>`).join('');

/* ----- buttons ----- */
document.getElementById('links').innerHTML = links.map((l,i)=>`
  <a class="btn ${l.primary?'primary':''}" style="--d:${1.05 + i*.08}s" href="${l.url}" target="_blank" rel="noopener">
    <span class="l"><span class="ic">${icons[l.type]||icons.map}</span><span class="nm">${l.label}</span></span>
    <span class="arr">→</span>
  </a>`).join('');

/* ----- footer ----- */
document.getElementById('foot').innerHTML = footerNote;
</script>
</body>
</html>
